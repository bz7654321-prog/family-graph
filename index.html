<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 인생 그래프</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --main-color: #ff922b; --bg-color: #f8faff; }
        body { font-family: 'Nanum Gothic', sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* 메인 컨테이너 */
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 800px; text-align: center; }
        
        header h1 { color: #333; margin-bottom: 5px; }
        header p { color: #666; margin-bottom: 20px; }

        /* 입력 영역 */
        .input-section { background: #fff9db; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }
        .btn-add { background-color: #4dabf7; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background-color: #339af0; }

        /* 저장될 영역 (캡쳐 대상) */
        #capture-area { background: white; padding: 20px; border-radius: 15px; }
        #display-name { font-size: 24px; font-weight: bold; margin: 20px 0; color: #333; border-bottom: 2px solid var(--main-color); display: inline-block; padding-bottom: 5px; }
        
        /* 리스트 영역 */
        .event-list { margin-top: 20px; text-align: left; max-width: 600px; margin-left: auto; margin-right: auto; }
        .event-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .event-info { display: flex; gap: 15px; }
        .event-year { font-weight: bold; color: var(--main-color); width: 60px; }
        
        /* 저장 버튼 */
        .btn-save { background-color: #51cf66; color: white; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 30px; box-shadow: 0 4px 15px rgba(81, 207, 102, 0.3); }
        .btn-save:hover { background-color: #40c057; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌟 우리 가족 인생 그래프</h1>
        <p>가족의 소중한 순간들을 기록해 보세요.</p>
    </header>

    <div class="input-section">
        <input type="text" id="user-name" placeholder="누구의 그래프인가요?" style="width: 200px; text-align: center; font-weight: bold;">
        <div class="input-group">
            <input type="number" id="year" placeholder="연도 (숫자)" style="width: 100px;">
            <input type="text" id="event" placeholder="어떤 일이 있었나요?" style="width: 250px;">
            <select id="score">
                <option value="100">최고!(100)</option>
                <option value="80">좋아요(80)</option>
                <option value="50">보통(50)</option>
                <option value="20">슬퍼요(20)</option>
            </select>
            <button class="btn-add" onclick="addData()">기록 추가</button>
        </div>
    </div>

    <div id="capture-area">
        <div id="display-name">이름을 입력해주세요</div>
        <canvas id="familyChart"></canvas>
        <div class="event-list" id="event-list">
            </div>
    </div>

    <button class="btn-save" onclick="downloadImage()">📸 사진으로 저장하여 제출하기</button>
</div>

<script>
    const ctx = document.getElementById('familyChart').getContext('2d');
    let lifeData = []; // 데이터를 담을 배열

    // 차트 초기 설정
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '행복 지수',
                data: [],
                borderColor: '#ff922b',
                backgroundColor: 'rgba(255, 146, 43, 0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 6,
                pointBackgroundColor: '#ff922b'
            }]
        },
        options: {
            scales: {
                y: { min: 0, max: 100, ticks: { stepSize: 20 } }
            },
            plugins: {
                legend: { display: false }
            }
        }
    });

    function addData() {
        const nameInput = document.getElementById('user-name').value;
        const year = document.getElementById('year').value;
        const event = document.getElementById('event').value;
        const score = document.getElementById('score').value;

        if(!year || !event) {
            alert("연도와 내용을 모두 입력해주세요!");
            return;
        }

        // 이름 표시 업데이트
        if(nameInput) {
            document.getElementById('display-name').innerText = nameInput + "의 인생 그래프";
        }

        // 1. 데이터 배열에 추가
        lifeData.push({
            year: parseInt(year),
            event: event,
            score: parseInt(score)
        });

        // 2. 연도순으로 정렬 (핵심 기능)
        lifeData.sort((a, b) => a.year - b.year);

        // 3. 차트 및 리스트 업데이트
        updateUI();

        // 입력창 비우기 (이름은 유지)
        document.getElementById('year').value = '';
        document.getElementById('event').value = '';
    }

    function updateUI() {
        // 차트 데이터 갱신
        chart.data.labels = lifeData.map(d => d.year + "년");
        chart.data.datasets[0].data = lifeData.map(d => d.score);
        chart.update();

        // 하단 리스트 갱신
        const listDiv = document.getElementById('event-list');
        listDiv.innerHTML = '<h3 style="font-size:16px; color:#666;">[인생 연표]</h3>';
        
        lifeData.forEach(d => {
            const item = document.createElement('div');
            item.className = 'event-item';
            item.innerHTML = `
                <div class="event-info">
                    <span class="event-year">${d.year}년</span>
                    <span class="event-text">${d.event}</span>
                </div>
                <span class="event-score">점수: ${d.score}</span>
            `;
            listDiv.appendChild(item);
        });
    }

    // 사진 저장 기능
    function downloadImage() {
        const captureArea = document.getElementById('capture-area');
        const name = document.getElementById('user-name').value || "가족";
        
        html2canvas(captureArea).then(canvas => {
            const link = document.createElement('a');
            link.download = name + '_인생그래프.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
