<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리가족 인생 연대기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #ff922b; --bg: #f8f9fa; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #e9ecef; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* 전체 박스 */
        .main-card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        
        /* 입력 섹션 */
        .input-box { background: #fff4e6; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #ffe8cc; }
        .input-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #dee2e6; font-size: 15px; }
        .name-input { width: 250px; text-align: center; font-size: 18px; font-weight: bold; border: 2px solid var(--primary); }
        .year-input { width: 120px; }
        .event-input { width: 300px; }
        
        .btn-add { background: #4dabf7; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #339af0; }

        /* 저장되는 영역 (캡쳐 대상) */
        #save-zone { background: white; padding: 30px; border-radius: 20px; text-align: center; }
        #title-display { font-size: 32px; font-weight: bold; color: #343a40; margin-bottom: 20px; display: inline-block; border-bottom: 4px solid var(--primary); }
        
        /* 그래프 크기 조절 */
        .chart-wrapper { position: relative; height: 400px; width: 100%; margin-bottom: 20px; }

        /* 연표 리스트 */
        .history-list { text-align: left; margin-top: 30px; border-top: 2px solid #f1f3f5; padding-top: 20px; }
        .history-item { display: flex; padding: 10px; border-bottom: 1px solid #f1f3f5; font-size: 16px; }
        .h-year { font-weight: bold; color: var(--primary); width: 100px; }
        .h-event { flex: 1; }

        /* 사진 저장 버튼 */
        .btn-download { background: #51cf66; color: white; border: none; padding: 18px 40px; border-radius: 50px; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 15px rgba(81,207,102,0.4); }
        .btn-download:hover { background: #40c057; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="main-card">
    <div class="input-box">
        <div style="text-align: center; margin-bottom: 10px;">
            <strong>학생 이름:</strong> 
            <input type="text" id="student-name" class="name-input" placeholder="이름을 입력하세요" oninput="updateTitle()">
        </div>
        <div class="input-row">
            <input type="number" id="year" class="year-input" placeholder="연도 (20XX)">
            <input type="text" id="event" class="event-input" placeholder="사건 (예: 초등학교 입학)">
            <select id="score">
                <option value="100">최고(100)</option>
                <option value="80">좋음(80)</option>
                <option value="50">보통(50)</option>
                <option value="20">슬픔(20)</option>
            </select>
            <button class="btn-add" onclick="addItem()">내용 추가</button>
        </div>
    </div>

    <div id="save-zone">
        <div id="title-display">우리 가족 인생 그래프</div>
        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>
        <div id="history-box" class="history-list">
            <p style="color: #adb5bd; text-align: center;">내용을 입력하면 연표가 자동으로 정리됩니다.</p>
        </div>
    </div>

    <div style="text-align: center;">
        <button class="btn-download" onclick="takePhoto()">📸 사진으로 저장하여 제출하기</button>
    </div>
</div>

<script>
    // 1. 데이터 저장 저장소
    let items = []; 
    const ctx = document.getElementById('myChart').getContext('2d');

    // 2. 차트 초기화
    let myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '행복 점수',
                data: [],
                borderColor: '#ff922b',
                backgroundColor: 'rgba(255, 146, 43, 0.1)',
                borderWidth: 4,
                fill: true,
                tension: 0.3,
                pointRadius: 8,
                pointBackgroundColor: '#ff922b'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { min: 0, max: 100 }
            }
        }
    });

    // 3. 이름 입력 시 실시간 타이틀 변경
    function updateTitle() {
        const name = document.getElementById('student-name').value;
        document.getElementById('title-display').innerText = name ? name + "의 인생 그래프" : "우리 가족 인생 그래프";
    }

    // 4. 데이터 추가 및 자동 정렬 함수
    function addItem() {
        const year = document.getElementById('year').value;
        const event = document.getElementById('event').value;
        const score = document.getElementById('score').value;

        if (!year || !event) {
            alert("연도와 사건 내용을 입력해주세요!");
            return;
        }

        // 데이터 추가
        items.push({
            year: parseInt(year),
            event: event,
            score: parseInt(score)
        });

        // [중요] 연도순으로 정렬 (2010, 2024 등 입력순서 상관없음)
        items.sort((a, b) => a.year - b.year);

        // UI 업데이트
        refreshUI();

        // 입력창 비우기
        document.getElementById('year').value = '';
        document.getElementById('event').value = '';
    }

    // 5. 화면 갱신 함수 (차트 + 연표)
    function refreshUI() {
        // 차트 업데이트
        myChart.data.labels = items.map(i => i.year + "년");
        myChart.data.datasets[0].data = items.map(i => i.score);
        myChart.update();

        // 연표 리스트 업데이트
        const historyBox = document.getElementById('history-box');
        historyBox.innerHTML = '<h3>[가족 연표]</h3>';
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span class="h-year">${item.year}년</span><span class="h-event">${item.event}</span><span>점수: ${item.score}</span>`;
            historyBox.appendChild(div);
        });
    }

    // 6. 이미지 저장 (캡쳐) 함수
    function takePhoto() {
        const name = document.getElementById('student-name').value || "가족";
        const target = document.getElementById('save-zone');

        html2canvas(target).then(canvas => {
            const link = document.createElement('a');
            link.download = name + '_인생연대기.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
