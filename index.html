<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 가족 인생 그래프</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        .title-area h1 {
            color: #ff6b6b;
            font-size: 32px;
            margin-bottom: 30px;
        }

        /* 입력 영역 (분홍색 점선) */
        .input-section {
            border: 2px dashed #ffb6c1;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            background-color: #fffafb;
        }

        .name-input-wrapper {
            margin-bottom: 20px;
        }
        #studentName {
            width: 250px;
            padding: 12px;
            text-align: center;
            border: 2px solid #48d1cc;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }

        .data-input-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .data-input-row input, .data-input-row select {
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 15px;
        }
        #inputYear { width: 110px; }
        #inputEvent { width: 250px; }
        
        .btn-add {
            background-color: #48d1cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .content-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        .chart-container { flex: 1.8; }
        .chart-title {
            font-size: 24px;
            font-weight: bold;
            color: #343a40;
            margin-bottom: 20px;
        }

        .list-container {
            flex: 1;
            border: 1px solid #f1f3f5;
            border-radius: 10px;
            padding: 20px;
            background: #fafbfc;
            min-height: 300px;
        }
        .list-title {
            font-size: 18px;
            font-weight: bold;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-align: left;
        }
        
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #f8f9fa;
            font-size: 14px;
        }
        .item-year { color: #ff6b6b; font-weight: bold; width: 55px; }
        .btn-delete {
            background-color: #ff8787;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 3px 8px;
            font-size: 11px;
            cursor: pointer;
        }

        .btn-save {
            background-color: #4da6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container" id="captureArea">
    
    <div class="title-area">
        <h1>🌟 우리 가족 인생 그래프 🌟</h1>
    </div>

    <div class="input-section" data-html2canvas-ignore="true">
        <div class="name-input-wrapper">
            <input type="text" id="studentName" placeholder="학생 이름을 입력하세요">
        </div>
        
        <div class="data-input-row">
            <input type="number" id="inputYear" placeholder="연도(20xx)">
            <input type="text" id="inputEvent" placeholder="가족에게 어떤 일이 있었나요?">
            <select id="inputScore">
                <option value="100">😍 최고 (100)</option>
                <option value="70">😊 좋아 (70)</option>
                <option value="50">😐 보통 (50)</option>
                <option value="30">😥 슬퍼 (30)</option>
            </select>
            <button class="btn-add" onclick="addData()">입력하기</button>
        </div>
    </div>

    <div class="chart-title" id="displayTitle">우리 가족의 인생 그래프</div>

    <div class="content-section">
        <div class="chart-container">
            <canvas id="lifeChart"></canvas>
        </div>

        <div class="list-container">
            <div class="list-title">📜 가족 연표</div>
            <div id="eventList"></div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()" data-html2canvas-ignore="true">📸 사진으로 저장하여 제출하기</button>

</div>

<script>
    let graphData = []; 
    const ctx = document.getElementById('lifeChart').getContext('2d');

    let lifeChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '행복 점수',
                data: [],
                borderColor: '#ff6b6b',
                borderWidth: 4,
                pointBackgroundColor: 'white',
                pointBorderColor: '#ff6b6b',
                pointBorderWidth: 3,
                pointRadius: 6,
                tension: 0 
            }]
        },
        options: {
            responsive: true,
            scales: { y: { min: 0, max: 100, ticks: { stepSize: 20 } } },
            plugins: { legend: { display: false } }
        }
    });

    // 학생 이름 입력 시 제목 실시간 변경
    document.getElementById('studentName').addEventListener('input', function() {
        document.getElementById('displayTitle').innerText = this.value ? this.value + " 가족의 인생 그래프" : "우리 가족의 인생 그래프";
    });

    function addData() {
        const year = parseInt(document.getElementById('inputYear').value);
        const event = document.getElementById('inputEvent').value;
        const scoreSelect = document.getElementById('inputScore');
        const score = parseInt(scoreSelect.value);
        const emoji = scoreSelect.options[scoreSelect.selectedIndex].text.split(' ')[0];

        if (!year || !event) return alert("연도와 내용을 입력해주세요!");

        graphData.push({ id: Date.now(), year: year, event: event, score: score, emoji: emoji });

        // [정렬] 연도가 낮은 순서대로 정렬하여 그래프 왼쪽부터 배치
        graphData.sort((a, b) => a.year - b.year);

        updateUI();
        document.getElementById('inputYear').value = '';
        document.getElementById('inputEvent').value = '';
    }

    function deleteData(id) {
        graphData = graphData.filter(item => item.id !== id);
        updateUI();
    }

    function updateUI() {
        lifeChart.data.labels = graphData.map(item => item.year + "년");
        lifeChart.data.datasets[0].data = graphData.map(item => item.score);
        lifeChart.update();

        const listDiv = document.getElementById('eventList');
        listDiv.innerHTML = '';
        graphData.forEach(item => {
            const row = document.createElement('div');
            row.className = 'list-item';
            row.innerHTML = `
                <span class="item-year">${item.year}년</span>
                <span style="flex:1; text-align:left; margin-left:10px;">${item.emoji} ${item.event}</span>
                <button class="btn-delete" onclick="deleteData(${item.id})">삭제</button>
            `;
            listDiv.appendChild(row);
        });
    }

    function saveImage() {
        const captureDiv = document.getElementById('captureArea');
        const studentName = document.getElementById('studentName').value || "우리_가족";
        html2canvas(captureDiv, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = studentName + '_인생그래프.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
