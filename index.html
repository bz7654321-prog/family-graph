<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 인생 그래프</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 기본 배경 및 폰트 설정 */
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
            background-color: #f0f8ff; /* 연한 파란색 배경 */
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        /* 메인 흰색 컨테이너 */
        .container {
            background-color: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        /* 상단 제목 영역 */
        .title-area h1 {
            color: #ff6b6b;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            background-color: #e9ecef;
            color: #495057;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* 입력 영역 (핑크색 점선 테두리) */
        .input-section {
            border: 2px dashed #ffb6c1;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
            background-color: #fffafb;
        }

        /* 이름 입력칸 */
        .name-input-wrapper {
            margin-bottom: 20px;
        }
        #userName {
            width: 250px;
            padding: 12px;
            text-align: center;
            border: 2px solid #48d1cc;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            outline: none;
        }
        #userName::placeholder { color: #adb5bd; }

        /* 데이터 입력칸 모음 */
        .data-input-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .data-input-row input, .data-input-row select {
            padding: 10px 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }
        #inputYear { width: 100px; }
        #inputEvent { width: 250px; }
        
        /* 입력 버튼 (민트색) */
        .btn-add {
            background-color: #48d1cc;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background-color: #3cb371; }

        /* 하단 그래프 및 연표 영역 */
        .content-section {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            align-items: flex-start;
        }

        /* 그래프 영역 */
        .chart-container {
            flex: 1.8;
            background: white;
        }
        .chart-title {
            font-size: 24px;
            font-weight: bold;
            color: #343a40;
            margin-bottom: 20px;
        }

        /* 인생 연표 리스트 영역 */
        .list-container {
            flex: 1;
            border: 1px solid #f1f3f5;
            border-radius: 10px;
            padding: 20px;
            background: #fafbfc;
            min-height: 300px;
        }
        .list-title {
            font-size: 18px;
            font-weight: bold;
            color: #495057;
            text-align: left;
            margin-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
        }
        
        /* 개별 연표 아이템 */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid #f8f9fa;
        }
        .item-year {
            color: #ff6b6b;
            font-weight: bold;
            font-size: 14px;
            width: 50px;
        }
        .item-event {
            flex: 1;
            text-align: left;
            font-size: 14px;
            color: #343a40;
            margin-left: 10px;
        }
        .btn-delete {
            background-color: #ff8787;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 사진 제출 버튼 (파란색) */
        .btn-save {
            background-color: #4da6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(77, 166, 255, 0.3);
            margin-top: 20px;
        }
        .btn-save:hover { background-color: #3399ff; }

    </style>
</head>
<body>

<div class="container" id="captureArea">
    
    <div class="title-area">
        <h1>🌟 나의 인생 그래프 🌟</h1>
        <div class="badge">🗓️ 2026학년도 3학년 (2017년생) 전용</div>
    </div>

    <div class="input-section" data-html2canvas-ignore="true">
        <div class="name-input-wrapper">
            <input type="text" id="userName" placeholder="이름을 적어주세요">
        </div>
        
        <div class="data-input-row">
            <input type="number" id="inputYear" placeholder="연도 (예: 2024)">
            <input type="text" id="inputEvent" placeholder="무슨 일이 있었나요?">
            <select id="inputScore">
                <option value="100">😍 최고 (100)</option>
                <option value="70">😊 좋아 (70)</option>
                <option value="50">😐 보통 (50)</option>
                <option value="30">😥 슬퍼 (30)</option>
            </select>
            <button class="btn-add" onclick="addData()">입력하기</button>
        </div>
    </div>

    <div class="chart-title" id="displayTitle">OOO의 인생 그래프</div>

    <div class="content-section">
        <div class="chart-container">
            <canvas id="lifeChart"></canvas>
        </div>

        <div class="list-container">
            <div class="list-title">📜 인생 연표</div>
            <div id="eventList">
                </div>
        </div>
    </div>

    <button class="btn-save" onclick="saveImage()" data-html2canvas-ignore="true">📸 사진으로 저장하여 제출하기</button>

</div>

<script>
    let graphData = []; 
    const ctx = document.getElementById('lifeChart').getContext('2d');

    // Chart.js 초기 설정 (이미지와 똑같은 코랄색 두꺼운 선)
    let lifeChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: '행복 점수',
                data: [],
                borderColor: '#ff6b6b', // 코랄색 선
                borderWidth: 4,
                backgroundColor: 'transparent',
                pointBackgroundColor: 'white',
                pointBorderColor: '#ff6b6b',
                pointBorderWidth: 3,
                pointRadius: 6,
                pointHoverRadius: 8,
                tension: 0 // 직선 형태
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: { 
                    min: 0, 
                    max: 100,
                    ticks: { stepSize: 20 }
                }
            },
            plugins: {
                legend: { display: false } // 상단 범례 숨김 (이미지와 동일)
            }
        }
    });

    // 1. 이름 입력 시 그래프 제목 실시간 변경
    document.getElementById('userName').addEventListener('input', function() {
        const name = this.value;
        document.getElementById('displayTitle').innerText = name ? name + "의 인생 그래프" : "OOO의 인생 그래프";
    });

    // 2. 데이터 추가 및 자동 정렬
    function addData() {
        const year = parseInt(document.getElementById('inputYear').value);
        const event = document.getElementById('inputEvent').value;
        const scoreSelect = document.getElementById('inputScore');
        const score = parseInt(scoreSelect.value);
        
        // 이모지 추출 (예: "😊 좋아 (70)" 에서 "😊" 만 가져오기)
        const emoji = scoreSelect.options[scoreSelect.selectedIndex].text.split(' ')[0];

        if (!year || !event) {
            alert("연도와 일어난 일을 모두 적어주세요!");
            return;
        }

        // 배열에 데이터 추가
        graphData.push({ id: Date.now(), year: year, event: event, score: score, emoji: emoji });

        // [핵심] 연도순으로 오름차순 정렬 (낮은 연도가 왼쪽으로)
        graphData.sort((a, b) => a.year - b.year);

        updateScreen();

        // 입력칸 비우기
        document.getElementById('inputYear').value = '';
        document.getElementById('inputEvent').value = '';
    }

    // 3. 데이터 삭제 기능
    function deleteData(id) {
        graphData = graphData.filter(item => item.id !== id);
        updateScreen();
    }

    // 4. 화면(그래프 및 리스트) 새로고침
    function updateScreen() {
        // 그래프 갱신
        lifeChart.data.labels = graphData.map(item => item.year + "년");
        lifeChart.data.datasets[0].data = graphData.map(item => item.score);
        lifeChart.update();

        // 연표 리스트 갱신
        const listDiv = document.getElementById('eventList');
        listDiv.innerHTML = ''; // 기존 목록 초기화

        graphData.forEach(item => {
            const row = document.createElement('div');
            row.className = 'list-item';
            row.innerHTML = `
                <span class="item-year">${item.year}년</span>
                <span class="item-event">${item.emoji} ${item.event}</span>
                <button class="btn-delete" onclick="deleteData(${item.id})">삭제</button>
            `;
            listDiv.appendChild(row);
        });
    }

    // 5. 사진으로 저장하기 기능
    function saveImage() {
        const captureDiv = document.getElementById('captureArea');
        const userName = document.getElementById('userName').value || "학생";

        // html2canvas 실행
        html2canvas(captureDiv, { scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = userName + '_인생그래프.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>

</body>
</html>
